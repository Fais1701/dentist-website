<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmileCare Dental Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#e8f5e9,#f1f8e9);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:#2e3d2f;
}

.card{
background:#ffffff;
max-width:420px;
width:100%;
padding:30px;
border-radius:14px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
text-align:center;
}

h1{
font-weight:600;
font-size:28px;
color:#2e7d32;
margin-bottom:6px;
}

.subtitle{
color:#6b8e6b;
margin-bottom:25px;
font-size:15px;
}

input, textarea{
width:100%;
padding:14px;
margin-top:12px;
border-radius:8px;
border:1px solid #d6e4d8;
font-family:'Poppins',sans-serif;
font-size:14px;
transition:all 0.2s ease;
}

input:focus, textarea:focus{
outline:none;
border-color:#66bb6a;
box-shadow:0 0 0 2px rgba(102,187,106,0.15);
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#43a047,#66bb6a);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:transform 0.15s ease, box-shadow 0.15s ease;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 6px 12px rgba(0,0,0,0.15);
}

.footer{
margin-top:18px;
font-size:12px;
color:#8a9a8b;
}

</style>
</head>

<body>

<div class="card">

<h1>SmileCare Dental</h1>
<p class="subtitle">Book your dental appointment</p>

<form>

<input type="text" name="name" placeholder="Your Name" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<textarea name="problem" placeholder="Describe your dental concern"></textarea>

<button type="submit">Book Appointment</button>

</form>

<p class="footer">Healthy smiles start here</p>

</div>

</body>
</html>
