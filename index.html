<!DOCTYPE html>
<html>
<head>

<title>SmileCare Dental</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f4f9ff;
text-align:center;
padding:40px;
}

.card{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#0077ff;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:6px;
font-size:16px;
}

</style>

</head>

<body>

<div class="card">

<h1>SmileCare Dental Clinic</h1>

<p>Book an Appointment</p>

<form action="https://formspree.io/f/yourID" method="POST">

<input name="name" placeholder="Your Name" required>

<input name="phone" placeholder="Phone Number" required>

<textarea name="problem" placeholder="Dental problem"></textarea>

<button type="submit">Book Appointment</button>

</form>

</div>

</body>
</html>
